            <p>Organize your day efficiently</p>

        <!-- statstics -->
         <!-- ==============================  -->

        <section class="stats">

            <div class="stat-card">
                <h3>Total Tasks </h3>
                <p id="total-tasks" class="count">0</p>
            </div>

            <div class="stat-card">
                <h3>Pending </h3>
                <p id="pending-tasks" class="count">0</p>
            </div>

            <div class="stat-card">
                <h3>Completed </h3>
                <p id="completed-tasks" class="count">0</p>
            </div>

        </section>

        <section class="task-input">

            <input
