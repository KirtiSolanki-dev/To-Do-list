<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- dashboard 
       header
       statstics 
       task input 
       task list 

       so we have 4 sections  -->

    <div class="dashboard">
        <header class="header">

            <!-- header content  -->

            <h1>Smart To-Do List</h1>
            <p>Organize your day efficently</p>

        </header>

        <section class="stats">

            <!-- statstics -->

            <div class="stat-card">
                <h3>Total Task </h3>
                <p class="count">0</p>
            </div>
            <div class="stat-card">
                <h3>Pending </h3>
                <p class="count">0</p>
            </div>
            <div class="stat-card">
                <h3>Completed </h3>
                <p class="count">0</p>
            </div>
        </section>


        <section class="task-input">

            <!-- input content -->
            <input type="text" placeholder="Enter task here...">
            <button>Add Task</button>

        </section>

        <section class="task-list">

            <h2>Tasks</h2>

            <div class="task">
                <label class="task-content">
                    <input type="checkbox">
                    <span>JavaScript</span>
                </label>

                <div class="task-actions">
                    <button>Edit</button>
                    <button>Delete</button>
                </div>
            </div>

            <div class="task">
                <div class="task-content">
                    <input type="checkbox">
                    <span>CSS</span>
                </div>

                <div class="task-actions">
                    <button>Edit</button>
                    <button>Delete</button>
                </div>
            </div>

            <div class="task">
                <div class="task-content">
                    <input type="checkbox">
                    <span>HTML</span>
                </div>

                <div class="task-actions">
                    <button>Edit</button>
                    <button>Delete</button>
                </div>
            </div>

        </section>

    </div>

</body>

</html>
